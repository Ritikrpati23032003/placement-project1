apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Ritikrpati23032003/placement-project1.git
    targetRevision: main
    path: netwroking   # 👈 folder

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
