name: Full CI/CD (ECR + Scan + Update Manifest)

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
  FE_REPO: frontend
  BE_REPO: backend

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Checkout Code
      - name: Checkout
        uses: actions/checkout@v3

      # ✅ 2. Configure AWS Credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ 3. Create ECR Repositories (if not exist)
      - name: Create ECR Repos
        run: |
          aws ecr describe-repositories --repository-names $BE_REPO || \
          aws ecr create-repository --repository-name $BE_REPO

          aws ecr describe-repositories --repository-names $FE_REPO || \
          aws ecr create-repository --repository-name $FE_REPO

      # ✅ 4. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ✅ 5. Set Image Tag (Version)
      - name: Set Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # =========================
      # 🔷 BACKEND
      # =========================

      - name: Build Backend
        run: docker build -t $BE_REPO:$IMAGE_TAG ./DataStore

      - name: Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BE_REPO }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push Backend
        run: |
          docker tag $BE_REPO:$IMAGE_TAG \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BE_REPO:$IMAGE_TAG
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BE_REPO:$IMAGE_TAG

      # =========================
      # 🔷 FRONTEND
      # =========================

      - name: Build Frontend
        run: docker build -t $FE_REPO:$IMAGE_TAG ./DataStoreFront

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FE_REPO }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push Frontend
        run: |
          docker tag $FE_REPO:$IMAGE_TAG \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FE_REPO:$IMAGE_TAG
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FE_REPO:$IMAGE_TAG

      # =========================
      # 🔥 UPDATE K8s MANIFESTS
      # =========================

      - name: Update Backend YAML
        run: |
          sed -i "s|image:.*backend.*|image: $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BE_REPO:$IMAGE_TAG|g" deployment/backend/datastore-be.yaml

      - name: Update Frontend YAML
        run: |
          sed -i "s|image:.*frontend.*|image: $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FE_REPO:$IMAGE_TAG|g" deployment/frontend/datastore-fe.yaml

      # =========================
      # 🟢 COMMIT BACK TO GITHUB
      # =========================

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add deployment/backend/datastore-be.yaml deployment/frontend/datastore-fe.yaml

          git commit -m "Update images to $IMAGE_TAG" || echo "No changes"

          git push
