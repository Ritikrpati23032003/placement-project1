name: CI/CD (Backend + Frontend with ECR Scan)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

  BACKEND_REPO: backend
  FRONTEND_REPO: frontend

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # Debug (optional)
      # -------------------------
      - name: Debug Repo Structure
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -R

      # -------------------------
      # AWS Credentials
      # -------------------------
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------
      # Login ECR
      # -------------------------
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------
      # Build + Push + Update YAML
      # -------------------------
      - name: Build & Push Images
        run: |
          set -e
          IMAGE_TAG="${GITHUB_SHA}"
          ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

          # ===== BACKEND =====
          echo "🚀 Building Backend"

          aws ecr describe-repositories --repository-names $BACKEND_REPO >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name $BACKEND_REPO

          docker build -t $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG ./DataStore
          docker push $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG

          # ===== FRONTEND =====
          echo "🚀 Building Frontend"

          aws ecr describe-repositories --repository-names $FRONTEND_REPO >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name $FRONTEND_REPO

          docker build -t $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG ./DataStoreFront
          docker push $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG

          # ===== UPDATE YAML (SAFE) =====
          sed -i "s|image:.*backend.*|image: $ECR_REGISTRY/backend:$IMAGE_TAG|g" deployment/backend/datastore-be.yaml

          sed -i "s|image:.*frontend.*|image: $ECR_REGISTRY/frontend:$IMAGE_TAG|g" deployment/frontend/datastore-fe.yaml

      # -------------------------
      # Commit changes
      # -------------------------
      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add deployment/backend/datastore-be.yaml
          git add deployment/frontend/datastore-fe.yaml

          git commit -m "Update images to $GITHUB_SHA [skip ci]" || echo "No changes"
          git push

      # -------------------------
      # Install jq
      # -------------------------
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # -------------------------
      # Scan Backend
      # -------------------------
      - name: Scan Backend Image
        run: |
          IMAGE_TAG="${GITHUB_SHA}"

          aws ecr start-image-scan \
            --repository-name $BACKEND_REPO \
            --image-id imageTag=$IMAGE_TAG || true

          aws ecr wait image-scan-complete \
            --repository-name $BACKEND_REPO \
            --image-id imageTag=$IMAGE_TAG

          FINDINGS=$(aws ecr describe-image-scan-findings \
            --repository-name $BACKEND_REPO \
            --image-id imageTag=$IMAGE_TAG \
            --query 'imageScanFindings.findingSeverityCounts' \
            --output json)

          echo "Backend Scan: $FINDINGS"

          CRITICAL=$(echo "$FINDINGS" | jq '.CRITICAL // 0')

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities in backend"
            exit 1
          fi

      # -------------------------
      # Scan Frontend
      # -------------------------
      - name: Scan Frontend Image
        run: |
          IMAGE_TAG="${GITHUB_SHA}"

          aws ecr start-image-scan \
            --repository-name $FRONTEND_REPO \
            --image-id imageTag=$IMAGE_TAG || true

          aws ecr wait image-scan-complete \
            --repository-name $FRONTEND_REPO \
            --image-id imageTag=$IMAGE_TAG

          FINDINGS=$(aws ecr describe-image-scan-findings \
            --repository-name $FRONTEND_REPO \
            --image-id imageTag=$IMAGE_TAG \
            --query 'imageScanFindings.findingSeverityCounts' \
            --output json)

          echo "Frontend Scan: $FINDINGS"

          CRITICAL=$(echo "$FINDINGS" | jq '.CRITICAL // 0')

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities in frontend"
            exit 1
          fi

      # -------------------------
      # Prevent loop
      # -------------------------
      - name: Skip CI loop
        if: contains(github.event.head_commit.message, '[skip ci]')
        run: echo "Skipping re-trigger"
