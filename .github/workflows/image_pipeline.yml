name: CI/CD (Backend + Frontend with ECR Scan)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

  BACKEND_REPO: backend
  FRONTEND_REPO: frontend

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # AWS Credentials
      # -------------------------
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------
      # Login ECR
      # -------------------------
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------
      # Set Variables
      # -------------------------
      - name: Set Variables
        run: |
          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_ENV

      # -------------------------
      # Create ECR Repos
      # -------------------------
      - name: Create ECR Repositories
        run: |
          aws ecr describe-repositories --repository-names $BACKEND_REPO >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name $BACKEND_REPO

          aws ecr describe-repositories --repository-names $FRONTEND_REPO >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name $FRONTEND_REPO

      # =========================
      # 🔷 BACKEND
      # =========================

      # Build Backend
      - name: Build Backend
        run: |
          docker build -t backend:latest ./DataStore

      # Scan Backend (LOCAL BEFORE PUSH)
      - name: Scan Backend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:latest
          severity: CRITICAL
          exit-code: 1

      # Push Backend
      - name: Push Backend
        run: |
          docker tag backend:latest $ECR_REGISTRY/$BACKEND_REPO:latest
          docker push $ECR_REGISTRY/$BACKEND_REPO:latest

      # =========================
      # 🔷 FRONTEND
      # =========================

      # Build Frontend
      - name: Build Frontend
        run: |
          docker build -t frontend:latest ./DataStoreFront

      # Scan Frontend (LOCAL BEFORE PUSH)
      - name: Scan Frontend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:latest
          severity: CRITICAL
          exit-code: 1

      # Push Frontend
      - name: Push Frontend
        run: |
          docker tag frontend:latest $ECR_REGISTRY/$FRONTEND_REPO:latest
          docker push $ECR_REGISTRY/$FRONTEND_REPO:latest

      # =========================
      # 🔥 UPDATE K8s YAML
      # =========================

      - name: Update Backend YAML
        run: |
          sed -i "s|image:.*backend.*|image: $ECR_REGISTRY/$BACKEND_REPO:latest|g" deployment/backend/datastore-be.yaml

      - name: Update Frontend YAML
        run: |
          sed -i "s|image:.*frontend.*|image: $ECR_REGISTRY/$FRONTEND_REPO:latest|g" deployment/frontend/datastore-fe.yaml

      # =========================
      # 🟢 COMMIT BACK
      # =========================

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add deployment/backend/datastore-be.yaml
          git add deployment/frontend/datastore-fe.yaml

          git commit -m "Update images to latest [skip ci]" || echo "No changes"
          git push

      # -------------------------
      # Prevent Loop
      # -------------------------
      - name: Skip CI loop
        if: contains(github.event.head_commit.message, '[skip ci]')
        run: echo "Skipping auto-trigger"
