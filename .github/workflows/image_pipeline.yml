name: Update Image with Scan (FE + BE)

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  AWS_REGION: us-east-1
  FE_REPO: frontend
  BE_REPO: backend

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # ✅ 2. Configure AWS Credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ 3. Login to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ✅ 4. Set Image Tag
      - name: Set Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # =========================
      # 🔷 BACKEND (DataStore)
      # =========================

      # ✅ 5. Build Backend Image
      - name: Build Backend
        run: docker build -t $BE_REPO:$IMAGE_TAG ./DataStore

      # ✅ 6. Scan Backend Image
      - name: Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BE_REPO }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1

      # ✅ 7. Push Backend Image
      - name: Push Backend
        run: |
          docker tag $BE_REPO:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$BE_REPO:$IMAGE_TAG
          docker push ${{ steps.login-ecr.outputs.registry }}/$BE_REPO:$IMAGE_TAG

      # =========================
      # 🔷 FRONTEND (DataStoreFront)
      # =========================

      # ✅ 8. Build Frontend Image
      - name: Build Frontend
        run: docker build -t $FE_REPO:$IMAGE_TAG -f DataStoreFront/Dockerfile-frontend ./DataStoreFront

      # ✅ 9. Scan Frontend Image
      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FE_REPO }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1

      # ✅ 10. Push Frontend Image
      - name: Push Frontend
        run: |
          docker tag $FE_REPO:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$FE_REPO:$IMAGE_TAG
          docker push ${{ steps.login-ecr.outputs.registry }}/$FE_REPO:$IMAGE_TAG

      # =========================
      # 🔥 UPDATE YAML FILES
      # =========================

      # ✅ 11. Update Backend YAML
      - name: Update BE YAML
        run: |
          sed -i "s|image:.*backend.*|image: ${{ steps.login-ecr.outputs.registry }}/$BE_REPO:$IMAGE_TAG|g" backend/datastore-be.yaml

      # ✅ 12. Update Frontend YAML
      - name: Update FE YAML
        run: |
          sed -i "s|image:.*frontend.*|image: ${{ steps.login-ecr.outputs.registry }}/$FE_REPO:$IMAGE_TAG|g" frontend/datastore-fe.yaml

      # =========================
      # 🟢 COMMIT BACK TO GITHUB
      # =========================

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add backend/datastore-be.yaml frontend/datastore-fe.yaml

          git commit -m "Update images to $IMAGE_TAG" || echo "No changes"

          git push
