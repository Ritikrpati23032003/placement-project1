name: argocd_deploy

on:
  workflow_run:
    workflows: ["CI/CD (Backend + Frontend with ECR Scan)"]  # must match name in File 1 exactly
    types:
      - completed

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}  # only runs if File 1 passed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Trigger
        run: |
          echo "Triggered by: ${{ github.event.workflow_run.name }}"
          echo "Status: ${{ github.event.workflow_run.conclusion }}"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}          # ✅ fixed

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Deploy Backend
        run: |
          kubectl apply -f deployment/backend/argocd-backend.yaml   # ✅ fixed path

      - name: Deploy Frontend
        run: |
          kubectl apply -f deployment/frontend/argocd-frontend.yaml  # ✅ fixed path
